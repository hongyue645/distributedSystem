services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "gateway:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MATCHING_WORKER_URL=http://matching-worker:8001
    depends_on:
      - matching-worker

  matching-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "matching_worker:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8001:8001"
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api-gateway