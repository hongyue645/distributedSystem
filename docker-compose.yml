services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "gateway:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file:
      - .env

  matching-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-u", "matching_worker.py"]
    env_file:
      - .env
    depends_on:
      - api-gateway

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api-gateway